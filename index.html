<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argust | Digital Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050810; /* Lebih gelap sedikit untuk kontras luar angkasa */
            color: #f8fafc;
            overflow: hidden; /* Mencegah scroll karena animasi */
        }

        /* --- SPACE BACKGROUND CSS --- */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        /* Bintang-bintang */
        .stars {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: blink 3s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Meteor/Shooting Star */
        .meteor {
            position: absolute;
            width: 2px; height: 2px;
            background: linear-gradient(90deg, white, transparent);
            box-shadow: 0 0 10px white;
            animation: shoot 10s linear infinite;
        }

        @keyframes shoot {
            0% { transform: translateX(120vw) translateY(-10vh) rotate(-45deg); opacity: 1; }
            10% { transform: translateX(-20vw) translateY(80vh) rotate(-45deg); opacity: 0; }
            100% { transform: translateX(-20vw) translateY(80vh) rotate(-45deg); opacity: 0; }
        }

        /* Planet Kecil */
        .planet {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8, #1e3a8a);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5), 0 0 20px rgba(56, 189, 248, 0.2);
            z-index: -2;
        }

        /* --- UI STYLES --- */
        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
        }

        .glass-card:hover {
            border: 1px solid rgba(56, 189, 248, 0.4);
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center">

    <div class="space-bg">
        <div class="planet w-32 h-32 top-[15%] right-[10%] opacity-40"></div>
        <div class="planet w-12 h-12 bottom-[20%] left-[15%] opacity-20 bg-purple-600"></div>
        
        <div class="meteor" style="top: 10%; animation-delay: 2s;"></div>
        <div class="meteor" style="top: 40%; animation-delay: 7s;"></div>

        </div>

    <main class="relative z-10 max-w-4xl w-full px-6 py-12 text-center">
        <div class="inline-block px-4 py-1.5 mb-6 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-400 text-xs font-bold tracking-widest uppercase">
            Argust • Digital Voyager
        </div>

        <div class="h-32 md:h-48 flex items-center justify-center">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter leading-tight">
                <span id="typed" class="gradient-text uppercase"></span>
            </h1>
        </div>
        
        <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto mb-12">
            Menggabungkan strategi digital dengan eksekusi kreatif untuk menciptakan pengalaman yang berdampak.
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto">
            <a href="/honda/tools/" class="glass-card p-6 rounded-2xl flex items-center justify-between group text-left">
                <div>
                    <h3 class="font-bold text-lg">Marketing Tools</h3>
                    <p class="text-slate-500 text-sm">Internal dashboard & editors</p>
                </div>
                <div class="bg-blue-500/20 p-3 rounded-xl group-hover:bg-blue-500 group-hover:text-white transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </div>
            </a>

            <a href="https://argust.my.id" target="_blank" class="glass-card p-6 rounded-2xl flex items-center justify-between group text-left">
                <div>
                    <h3 class="font-bold text-lg">Personal Blog</h3>
                    <p class="text-slate-500 text-sm">Insights & digital stories</p>
                </div>
                <div class="bg-purple-500/20 p-3 rounded-xl group-hover:bg-purple-500 group-hover:text-white transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
                    </svg>
                </div>
            </a>
        </div>
    </main>

    <footer class="relative z-10 mt-auto py-8 text-slate-600 text-[10px] tracking-[0.2em] uppercase font-bold">
        &copy; 2026 Gusti Ardias Riantono.
    </footer>

    <script>
        // Generate Bintang secara acak
        const space = document.querySelector('.space-bg');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'stars';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 3}s`;
            space.appendChild(star);
        }

        var typed = new Typed('#typed', {
            strings: [
                'Welcome to my space!',
                'Selamat datang di ruangku!',
                'Sugeng rawuh ing papan kulo!',
                'Bienvenue dans mon espace!',
                'Benvenuti nel mio spazio!',
                'Watashi no basho e yokoso!'
            ],
            typeSpeed: 50,
            backSpeed: 30,
            backDelay: 2000,
            loop: true
        });
    </script>

</body>
</html>
