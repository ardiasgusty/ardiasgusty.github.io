<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Test API Gemini</title>
</head>
<body style="font-family: sans-serif; padding: 50px;">
    <h2>Test Koneksi API Murni</h2>
    <input type="text" id="apikey" placeholder="Paste API Key di sini" style="width: 400px; padding: 10px;"><br><br>
    <button onclick="testAPI()" style="padding: 10px 20px; cursor: pointer;">Test Koneksi</button>
    
    <div style="margin-top: 20px; padding: 20px; background: #f0f0f0; border-radius: 8px;">
        <strong>Status:</strong> <span id="status">Menunggu...</span>
    </div>

    <script>
        async function testAPI() {
            const key = document.getElementById('apikey').value.trim();
            const statusEl = document.getElementById('status');
            
            if(!key) {
                statusEl.innerText = "API Key kosong!";
                return;
            }

            statusEl.innerText = "Menghubungi Google...";
            
            try {
                // Memanggil model yang terdaftar di akunmu (Gemini 3.5 Flash)
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "Halo, balas dengan kata 'Koneksi Berhasil' jika pesan ini sampai." }] }] 
                    })
                });
                
                const data = await response.json();
                
                if(response.ok) {
                    statusEl.innerHTML = `<span style="color: green;">BERHASIL! Balasan AI: ${data.candidates[0].content.parts[0].text}</span>`;
                } else {
                    // Menangkap pesan error asli langsung dari mesin Google
                    statusEl.innerHTML = `<span style="color: red;">GAGAL DARI GOOGLE!<br>Pesan asli: ${JSON.stringify(data.error)}</span>`;
                }
            } catch(e) {
                statusEl.innerHTML = `<span style="color: red;">ERROR KODE JAVASCRIPT: ${e.message}</span>`;
            }
        }
    </script>
</body>
</html>
