<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Honda Banner JSON Generator</title>

<style>
:root {
    --primary: #cc0000;
    --primary-hover: #a30000;
    --bg: #f4f6f9;
    --card: #ffffff;
    --border: #ddd;
    --text: #333;
    --github: #24292e;
    --github-hover: #1a1e22;
    --success: #2cbe4e;
    --success-hover: #228b3a;
}

*{
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    margin:0;
    background:var(--bg);
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* HEADER */
.header{
    background:#111;
    color:#fff;
    padding:15px 25px;
    font-size:20px;
    font-weight:bold;
    position:fixed;
    width:100%;
    z-index:10;
    display:flex;
    justify-content:space-between;
}

/* LAYOUT */
.container{
    display:flex;
    width:100%;
    margin-top:60px;
    height:calc(100vh - 60px);
}

.editor-panel{
    flex:6;
    padding:25px;
    overflow-y:auto;
    border-right:1px solid var(--border);
}

.output-panel{
    flex:4;
    padding:25px;
    background:#fff;
    display:flex;
    flex-direction:column;
}

/* CARD */
.category-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:20px 25px;
    margin-bottom:20px;
    transition:.2s;
}

.category-card:hover{
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.category-header{
    display:flex;
    justify-content:space-between;
    border-bottom:2px solid var(--primary);
    padding-bottom:10px;
    margin-bottom:20px;
}

/* ITEM */
.item-card{
    background:#fdfdfd;
    border:1px solid #eee;
    border-left:4px solid var(--primary);
    border-radius:6px;
    padding:18px;
    margin:10px 0 15px 20px;
}

/* FORM */
.form-group{
    margin-bottom:12px;
}

.form-group label{
    font-size:13px;
    font-weight:600;
    display:block;
    margin-bottom:6px;
}

.form-control{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:4px;
    outline:none;
}

.form-control:focus{
    border-color:var(--primary);
}

/* IMAGE PREVIEW */
.image-preview{
    margin-top:10px;
}

.image-preview img{
    width:100%;
    max-height:180px;
    object-fit:cover;
    border-radius:6px;
    border:1px solid #ddd;
    background:#f5f5f5;
    display:block;
}

/* BUTTON */
.btn{
    padding:8px 14px;
    border-radius:4px;
    cursor:pointer;
    border:none;
    font-weight:bold;
    transition:.2s;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-primary:hover{
    background:var(--primary-hover);
}

.btn-secondary{
    background:#555;
    color:white;
}

.btn-danger{
    background:#dc3545;
    color:white;
}

.btn-github {
    background: var(--github);
    color: white;
}

.btn-github:hover {
    background: var(--github-hover);
}

.btn-success {
    background: var(--success);
    color: white;
}

.btn-success:hover {
    background: var(--success-hover);
}

.btn-outline{
    border:1px solid #ccc;
    background:transparent;
}

.btn:hover:not(:disabled){
    transform:translateY(-1px);
}

.btn:disabled{
    opacity: 0.4;
    cursor: not-allowed;
}

/* OUTPUT */
#json-output{
    flex:1;
    margin-top:10px;
    padding:15px;
    font-family:monospace;
    background:#282c34;
    color:#d1d9e1;
    border-radius:6px;
    border:none;
    resize:none;
}

/* FLEX */
.flex-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.flex-1{
    flex:1;
}

/* TITLE */
.section-title{
    font-size:18px;
    margin-bottom:15px;
    border-bottom:2px solid #ccc;
    padding-bottom:5px;
}
</style>
</head>

<body>

<div class="header">
    <div>Honda Banner JSON Generator</div>
    <div style="font-size:14px;">Created for Argust</div>
</div>

<div class="container">

    <div class="editor-panel">

        <div class="category-card" style="border-left: 4px solid var(--github);">
            <div class="category-header" style="border-bottom: 2px solid var(--github); margin-bottom: 15px;">
                <h3 style="margin: 0; font-size: 16px;">🔗 GitHub Integration Sync</h3>
            </div>
            
            <div class="form-group">
                <label>Personal Access Token (PAT)</label>
                <input type="password" id="gh-token" class="form-control" placeholder="ghp_xxxxxxxxxxxx" oninput="saveConfig()">
            </div>
            
            <div class="flex-row">
                <div class="form-group flex-1">
                    <label>GitHub Username / Owner</label>
                    <input type="text" id="gh-owner" class="form-control" placeholder="Contoh: argust-dev" oninput="saveConfig()">
                </div>
                <div class="form-group flex-1">
                    <label>Repository Name</label>
                    <input type="text" id="gh-repo" class="form-control" placeholder="Contoh: honda-bintaro" oninput="saveConfig()">
                </div>
                <div class="form-group flex-1">
                    <label>File Path (.json)</label>
                    <input type="text" id="gh-path" class="form-control" placeholder="Contoh: data/banners.json" oninput="saveConfig()">
                </div>
            </div>
            
            <div class="flex-row" style="margin-top: 15px;">
                <button class="btn btn-github flex-1" onclick="fetchFromGitHub()">
                    ↓ Tarik dari GitHub
                </button>
                <button class="btn btn-success flex-1" onclick="saveToGitHub()">
                    ↑ Simpan Langsung ke GitHub
                </button>
            </div>
        </div>

        <div class="section-title">
            1. Banner (Desktop & Mobile)
        </div>

        <div id="models-container"></div>

    </div>

    <div class="output-panel">

        <h3>Preview & Output JSON</h3>

        <textarea id="json-output"></textarea>

        <div class="flex-row">

            <button 
                class="btn btn-primary flex-1" 
                onclick="copyJSON()"
            >
                Copy JSON
            </button>

            <button 
                class="btn btn-secondary flex-1" 
                onclick="loadJSON()"
            >
                Load JSON
            </button>

        </div>

    </div>

</div>

<script>

/* DATA */
let appData = {
    models: [
        {
            label: "Desktop Banner",
            items: []
        },
        {
            label: "Mobile Banner",
            items: []
        }
    ]
};

// Global variable untuk melacak SHA file GitHub saat ini (wajib untuk mekanisme update)
let currentFileSha = "";

/* RENDER */
function renderEditor(){

    const container = document.getElementById('models-container');

    container.innerHTML = '';

    appData.models.forEach((group, gIndex)=>{

        const card = document.createElement('div');

        card.className = 'category-card';

        card.innerHTML = `
            <div class="category-header">
                <h3>${group.label}</h3>
            </div>

            <div id="items-${gIndex}"></div>

            <button 
                class="btn btn-outline"
                onclick="addBanner(${gIndex})"
            >
                + Tambah Banner
            </button>
        `;

        container.appendChild(card);

        const items = card.querySelector(`#items-${gIndex}`);

        group.items.forEach((item, iIndex)=>{

            const el = document.createElement('div');

            el.className = 'item-card';

            el.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
                    <strong>Banner ${iIndex + 1}</strong>

                    <div style="display:flex; gap:5px;">
                        <button 
                            class="btn btn-secondary" 
                            onclick="moveUp(${gIndex},${iIndex})"
                            title="Geser ke Atas"
                            ${iIndex === 0 ? 'disabled' : ''}
                        >
                            ↑
                        </button>
                        
                        <button 
                            class="btn btn-secondary" 
                            onclick="moveDown(${gIndex},${iIndex})"
                            title="Geser ke Bawah"
                            ${iIndex === group.items.length - 1 ? 'disabled' : ''}
                        >
                            ↓
                        </button>

                        <button 
                            class="btn btn-danger"
                            onclick="removeBanner(${gIndex},${iIndex})"
                            title="Hapus Banner"
                        >
                            X
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label>ID</label>

                    <input
                        class="form-control"
                        value="${item.id || ''}"
                        oninput="update(${gIndex},${iIndex},'id',this.value)"
                    >
                </div>

                <div class="form-group">
                    <label>Image URL</label>

                    <input
                        class="form-control"
                        value="${item.image || ''}"
                        oninput="update(${gIndex},${iIndex},'image',this.value)"
                    >

                    ${
                        item.image
                        ? `
                        <div class="image-preview">
                            <img
                                src="${item.image}"
                                alt="preview"
                                onerror="this.style.display='none'"
                            >
                        </div>
                        `
                        : ''
                    }
                </div>

                <div class="form-group">
                    <label>Link</label>

                    <input
                        class="form-control"
                        value="${item.link || ''}"
                        oninput="update(${gIndex},${iIndex},'link',this.value)"
                    >
                </div>

                <div class="form-group">
                    <label>Alt Text</label>

                    <input
                        class="form-control"
                        value="${item.alt || ''}"
                        oninput="update(${gIndex},${iIndex},'alt',this.value)"
                    >
                </div>
            `;

            items.appendChild(el);

        });

    });

    updateOutput();
}

/* ACTION */
function addBanner(g){
    appData.models[g].items.push({
        id:'',
        image:'',
        link:'#',
        alt:''
    });
    renderEditor();
}

function removeBanner(g,i){
    appData.models[g].items.splice(i,1);
    renderEditor();
}

/* Geser ke Atas */
function moveUp(g, i) {
    if (i > 0) {
        let temp = appData.models[g].items[i];
        appData.models[g].items[i] = appData.models[g].items[i - 1];
        appData.models[g].items[i - 1] = temp;
        renderEditor();
    }
}

/* Geser ke Bawah */
function moveDown(g, i) {
    if (i < appData.models[g].items.length - 1) {
        let temp = appData.models[g].items[i];
        appData.models[g].items[i] = appData.models[g].items[i + 1];
        appData.models[g].items[i + 1] = temp;
        renderEditor();
    }
}

/* FIX INPUT LAG */
function update(g,i,k,v){
    appData.models[g].items[i][k] = v;
    updateOutput();

    if(k === 'image'){
        renderEditor();
    }
}

/* OUTPUT */
function updateOutput(){
    const json = {
        banners: {
            desktop: appData.models[0].items,
            mobile: appData.models[1].items
        }
    };

    document.getElementById('json-output').value =
        JSON.stringify(json,null,2);
}

function loadJSON(){
    try{
        const data = JSON.parse(
            document.getElementById('json-output').value
        );

        appData.models[0].items = data.banners?.desktop || [];
        appData.models[1].items = data.banners?.mobile || [];

        renderEditor();

    }catch{
        alert('JSON error');
    }
}

function copyJSON(){
    const el = document.getElementById('json-output');
    el.select();
    document.execCommand('copy');
    alert('Copied!');
}


/* =======================================================
   FITUR BARU: GITHUB INTEGRATION LOGIC (FETCH & COMMIT)
   ======================================================= */

function saveConfig() {
    localStorage.setItem('gh_token', document.getElementById('gh-token').value.trim());
    localStorage.setItem('gh_owner', document.getElementById('gh-owner').value.trim());
    localStorage.setItem('gh_repo', document.getElementById('gh-repo').value.trim());
    localStorage.setItem('gh_path', document.getElementById('gh-path').value.trim());
}

function loadConfig() {
    document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
    document.getElementById('gh-owner').value = localStorage.getItem('gh_owner') || '';
    document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
    document.getElementById('gh-path').value = localStorage.getItem('gh_path') || '';
}

async function fetchFromGitHub() {
    const token = document.getElementById('gh-token').value.trim();
    const owner = document.getElementById('gh-owner').value.trim();
    const repo = document.getElementById('gh-repo').value.trim();
    const path = document.getElementById('gh-path').value.trim();

    if (!token || !owner || !repo || !path) {
        alert('Harap isi semua konfigurasi GitHub Integration terlebih dahulu!');
        return;
    }

    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

    try {
        const response = await fetch(url, {
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json'
            }
        });

        if (!response.ok) {
            throw new Error(`Gagal mengambil data (${response.status}). Periksa Token/Konfigurasi Repo.`);
        }

        const data = await response.json();
        currentFileSha = data.sha; // Ambil SHA file untuk proses update nanti

        // Decode Base64 dari GitHub dengan aman agar support karakter UTF-8
        const decodedContent = decodeURIComponent(escape(atob(data.content)));
        const json = JSON.parse(decodedContent);

        appData.models[0].items = json.banners?.desktop || [];
        appData.models[1].items = json.banners?.mobile || [];

        renderEditor();
        alert('Data Berhasil ditarik dari GitHub!');
    } catch (error) {
        alert(error.message);
    }
}

async function saveToGitHub() {
    const token = document.getElementById('gh-token').value.trim();
    const owner = document.getElementById('gh-owner').value.trim();
    const repo = document.getElementById('gh-repo').value.trim();
    const path = document.getElementById('gh-path').value.trim();

    if (!token || !owner || !repo || !path) {
        alert('Harap isi semua konfigurasi GitHub Integration terlebih dahulu!');
        return;
    }

    // Mengambil manifestasi JSON string terbaru dari state aplikasi
    const jsonContent = {
        banners: {
            desktop: appData.models[0].items,
            mobile: appData.models[1].items
        }
    };
    const stringContent = JSON.stringify(jsonContent, null, 2);
    
    // Encode string JSON ke Base64 dengan aman (mendukung UTF-8)
    const encodedContent = btoa(unescape(encodeURIComponent(stringContent)));

    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

    // Jika currentFileSha kosong, kita lakukan silent check ke GitHub untuk mendapatkan SHA terbaru agar tidak menimbulkan konflik 409
    if (!currentFileSha) {
        try {
            const checkRes = await fetch(url, {
                headers: { 'Authorization': `token ${token}` }
            });
            if (checkRes.ok) {
                const checkData = await checkRes.json();
                currentFileSha = checkData.sha;
            }
        } catch (e) {
            console.log("Gagal melakukan verifikasi awal SHA:", e);
        }
    }

    const bodyData = {
        message: "⚡ Update banners.json via Honda Banner JSON Generator Tool",
        content: encodedContent
    };

    // GitHub mewajibkan parameter SHA lama jika kita mengedit/mengganti file lama
    if (currentFileSha) {
        bodyData.sha = currentFileSha;
    }

    try {
        const response = await fetch(url, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(bodyData)
        });

        if (!response.ok) {
            const errData = await response.json();
            throw new Error(`Gagal menyimpan: ${errData.message || response.statusText}`);
        }

        const resData = await response.json();
        currentFileSha = resData.content.sha; // Perbarui SHA global dengan kode SHA commit terbaru
        alert('Hebat! File JSON Anda berhasil disimpan/dikomit langsung ke GitHub!');
    } catch (error) {
        alert(error.message);
    }
}

/* INIT */
window.onload = function() {
    loadConfig();
    renderEditor();
};

</script>

</body>
</html>
